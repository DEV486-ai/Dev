// ── BOOKMARK HELPERS ──────────────────────────────────────
const getBM=()=>{try{return JSON.parse(localStorage.getItem("bb_bookmarks")||"[]");}catch{return[];}};
const saveBM=(list)=>localStorage.setItem("bb_bookmarks",JSON.stringify(list));

// ── BROWSER VIEW ───────────────────────────────────────────
function BrowserView({url,onClose}){
  const [loading,setLoading]=useState(true);
  const [currentUrl,setCurrentUrl]=useState(url);
  const [inputUrl,setInputUrl]=useState(url);
  const [showKb,setShowKb]=useState(false);
  const [showBM,setShowBM]=useState(false);
  const [bookmarks,setBookmarks]=useState(getBM);
  const [bmMsg,setBmMsg]=useState("");
  const inputRef=useRef(null);

  const getEmbed=(u)=>{
    if(u.includes("youtube.com/results?search_query=")){
      const q=u.split("search_query=")[1]?.split("&")[0]||"";
      return `https://www.youtube.com/embed?listType=search&list=${q}`;
    }
    if(u.includes("youtube.com/watch?v=")){
      const v=u.split("v=")[1]?.split("&")[0];
      return `https://www.youtube.com/embed/${v}?autoplay=1`;
    }
    if(u.includes("google.com/maps/search/")||u.includes("maps.google.com")){
      const q=u.includes("/search/")?u.split("/search/")[1]||"":u.split("q=")[1]?.split("&")[0]||"India";
      return `https://maps.google.com/maps?q=${encodeURIComponent(decodeURIComponent(q))}&output=embed&z=14`;
    }
    return u;
  };

  const isYT=currentUrl.includes("youtube.com")||currentUrl.includes("youtu.be");
  const ytVid=isYT?(currentUrl.split("v=")[1]?.split("&")[0]||null):null;

  const addBookmark=()=>{
    const list=getBM();
    if(list.find(b=>b.url===currentUrl)){setBmMsg("⭐ আগেই সেভ আছে!");setTimeout(()=>setBmMsg(""),2000);return;}
    const updated=[{url:currentUrl,title:currentUrl,time:Date.now()},...list.slice(0,49)];
    saveBM(updated);setBookmarks(updated);
    setBmMsg("⭐ বুকমার্ক সেভ হয়েছে!");setTimeout(()=>setBmMsg(""),2000);
  };

  const delBookmark=(idx)=>{
    const updated=bookmarks.filter((_,i)=>i!==idx);
    saveBM(updated);setBookmarks(updated);
  };

  const openYTApp=()=>{
    const link=ytVid?`https://www.youtube.com/watch?v=${ytVid}`:currentUrl;
    const intent=ytVid?`intent://youtube.com/watch?v=${ytVid}#Intent;package=com.google.android.youtube;scheme=https;end`:null;
    if(intent)window.location.href=intent;
    setTimeout(()=>window.open(link,"_blank"),800);
  };

  const downloadPage=()=>{
    if(/\.(jpg|jpeg|png|gif|pdf|mp3|mp4|zip|apk)$/i.test(currentUrl)){
      const a=document.createElement("a");a.href=currentUrl;a.download=currentUrl.split("/").pop();a.click();
    } else {
      window.open(currentUrl,"_blank");
    }
  };

  const navBtnS={background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"7px",padding:"6px 9px",color:"rgba(255,255,255,0.7)",fontSize:"13px",cursor:"pointer",flexShrink:0};

  return(
    <div style={{position:"fixed",inset:0,background:"#0d0d1a",zIndex:4000,display:"flex",flexDirection:"column"}}>

      {/* Top bar */}
      <div style={{background:"rgba(0,0,0,0.92)",padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
        {/* Row 1: close + url + go */}
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
          <button onClick={onClose} style={{...navBtnS,background:"rgba(255,60,60,0.2)",border:"1px solid rgba(255,60,60,0.3)",color:"#ff6b6b",fontWeight:700}}>✕</button>
          <div style={{flex:1,position:"relative"}}>
            <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"11px"}}>🔒</span>
            <input ref={inputRef} value={inputUrl} onChange={e=>setInputUrl(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){setCurrentUrl(inputUrl);setLoading(true);}}}
              style={{width:"100%",padding:"7px 8px 7px 26px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"9px",color:"#fff",fontSize:"11px",outline:"none",boxSizing:"border-box",fontFamily:"'Inter',sans-serif"}}/>
          </div>
          <button onClick={()=>{setCurrentUrl(inputUrl);setLoading(true);}} style={{...navBtnS,background:"rgba(132,94,247,0.35)",color:"#c4b5fd"}}>→</button>
        </div>
        {/* Row 2: action buttons */}
        <div style={{display:"flex",gap:"5px",alignItems:"center",overflowX:"auto"}}>
          <button onClick={addBookmark} style={navBtnS} title="বুকমার্ক করো">⭐</button>
          <button onClick={()=>setShowBM(p=>!p)} style={{...navBtnS,background:showBM?"rgba(132,94,247,0.3)":undefined}} title="বুকমার্ক দেখো">📚</button>
          <button onClick={()=>setShowKb(p=>!p)} style={{...navBtnS,background:showKb?"rgba(132,94,247,0.3)":undefined}} title="বাংলা Keyboard">⌨️</button>
          <button onClick={downloadPage} style={navBtnS} title="Download">📥</button>
          <button onClick={()=>window.open(currentUrl,"_blank")} style={navBtnS} title="Chrome-এ খুলুন">↗</button>
          {isYT&&<button onClick={openYTApp} style={{...navBtnS,background:"rgba(255,0,0,0.25)",color:"#ff6b6b",fontSize:"11px",padding:"6px 8px"}}>▶ YT App</button>}
          {bmMsg&&<span style={{color:"#34c759",fontSize:"10px",whiteSpace:"nowrap",fontWeight:700,marginLeft:"4px"}}>{bmMsg}</span>}
        </div>
      </div>

      {/* Loading bar */}
      {loading&&<div style={{height:"3px",background:"rgba(255,255,255,0.04)",flexShrink:0,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",height:"100%",width:"30%",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",animation:"slidebar 1.2s ease infinite"}}/>
      </div>}

      {/* Bookmark panel */}
      {showBM&&(
        <div style={{background:"rgba(10,10,24,0.98)",borderBottom:"1px solid rgba(255,255,255,0.07)",maxHeight:"220px",overflowY:"auto",flexShrink:0,padding:"8px 10px"}}>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",fontWeight:700,margin:"0 0 7px"}}>⭐ সেভ করা বুকমার্ক ({bookmarks.length})</p>
          {bookmarks.length===0&&<p style={{color:"rgba(255,255,255,0.2)",fontSize:"11px",textAlign:"center",padding:"12px 0"}}>এখনো কোনো বুকমার্ক নেই</p>}
          {bookmarks.map((b,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 8px",background:"rgba(255,255,255,0.04)",borderRadius:"9px",marginBottom:"5px",border:"1px solid rgba(255,255,255,0.06)"}}>
              <span style={{fontSize:"13px"}}>🌐</span>
              <span onClick={()=>{setCurrentUrl(b.url);setInputUrl(b.url);setLoading(true);setShowBM(false);}} style={{flex:1,color:"#c4b5fd",fontSize:"11px",cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.url}</span>
              <button onClick={()=>delBookmark(i)} style={{background:"transparent",border:"none",color:"rgba(255,100,100,0.6)",cursor:"pointer",fontSize:"14px",flexShrink:0}}>🗑</button>
            </div>
          ))}
        </div>
      )}

      {/* iframe */}
      <iframe src={getEmbed(currentUrl)} style={{flex:1,border:"none",width:"100%"}}
        allowFullScreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share"
        onLoad={()=>setLoading(false)}
        referrerPolicy="no-referrer-when-downgrade"
      />

      {/* Bengali keyboard */}
      {showKb&&<BengaliKeyboard targetRef={inputRef} onClose={()=>setShowKb(false)}/>}

      {!showKb&&<div style={{background:"rgba(0,0,0,0.7)",padding:"4px",textAlign:"center",flexShrink:0}}>
        <span style={{color:"rgba(255,255,255,0.15)",fontSize:"9px"}}>🌐 BongBrowser Engine</span>
      </div>}
    </div>
  );
}

      body:JSON.stringify({

        max_tokens:1500,
        system:`তুমি BongBrowser AI — একটি অত্যন্ত বুদ্ধিমান, সৎ এবং সহায়ক AI Assistant।

তোমার উত্তর দেওয়ার নিয়ম:
১. সবসময় **বাংলায়** উত্তর দাও
২. উত্তর **বিস্তারিত এবং সম্পূর্ণ** হতে হবে — Google Gemini-র মতো
৩. **সত্য এবং সঠিক** তথ্য দাও — না জানলে সরাসরি বলো
৪. উত্তর **structured** করো:
   - প্রথমে সরাসরি মূল উত্তর দাও
   - তারপর বিস্তারিত ব্যাখ্যা করো
   - প্রয়োজনে numbered list বা bullet point ব্যবহার করো
   - শেষে সংক্ষেপ বা গুরুত্বপূর্ণ টিপস দাও
৫. **গুরুত্বপূর্ণ শব্দ** bold করো
৬. জটিল বিষয় সহজ ভাষায় বোঝাও
৭. প্রশ্নের সাথে সম্পর্কিত অতিরিক্ত দরকারি তথ্যও দাও
৮. কোনো বিষয়ে নিশ্চিত না হলে সৎভাবে বলো

উত্তরের দৈর্ঘ্য প্রশ্নের গুরুত্ব অনুযায়ী হবে — ছোট প্রশ্নে মাঝারি উত্তর, বড় বিষয়ে বিস্তারিত উত্তর।`,
        messages:[{role:"user",content:query}]
      })
    })
    .then(r=>r.json())
    .then(d=>{
      const text=d?.content?.[0]?.text||"";
      setAns(text||getFallback(query));
      setLoading(false);
    })
    .catch(()=>{setAns(getFallback(query));setLoading(false);});
  },[query]);

  const getFallback=(q)=>{
    const lq=q.toLowerCase();
    if(lq.includes("বাংলা")||lq.includes("সিনেমা")||lq.includes("cinema"))
      return `**বাংলা সিনেমার ইতিহাস ও বর্তমান**\n\nবাংলা চলচ্চিত্র শিল্প দুটি ভাগে বিভক্ত — ভারতের **টলিউড** (কলকাতা) এবং বাংলাদেশের **ঢালিউড** (ঢাকা)।\n\n**গোল্ডেন এরা:**\nসত্যজিৎ রায়ের **পথের পাঁচালী** (১৯৫৫) বাংলা সিনেমাকে বিশ্বমঞ্চে নিয়ে যায়। উত্তম কুমার-সুচিত্রা সেনের জুটি ছিল অসাধারণ।\n\n**বর্তমান:**\nদেব, জিৎ, প্রসেনজিৎ টলিউডে রাজত্ব করছেন। OTT প্ল্যাটফর্ম Hoichoi ও Chorki বাংলা কন্টেন্টকে নতুন উচ্চতায় নিয়েছে।\n\n💡 **মজার তথ্য:** পথের পাঁচালী কান চলচ্চিত্র উৎসবে সেরা মানব দলিল পুরস্কার পেয়েছিল।`;
    if(lq.includes("weather")||lq.includes("আবহাওয়া"))
      return `**আবহাওয়ার তথ্য পেতে:**\n\nসবচেয়ে সঠিক আবহাওয়া জানতে:\n১. Google-এ **"weather [তোমার শহর]"** লিখে সার্চ করো\n২. AccuWeather বা Weather.com দেখো\n৩. IMD (India Meteorological Department) এর ওয়েবসাইট: imd.gov.in\n\n💡 BongBrowser-এর **Maps** সেকশনে তোমার এলাকা দেখতে পারো।`;
    return `**"${q}"** সম্পর্কে আমি উত্তর দিতে প্রস্তুত।\n\nএই মুহূর্তে API connection-এ সমস্যা হচ্ছে। নিচের search results থেকে তথ্য নাও অথবা একটু পরে আবার জিজ্ঞেস করো।\n\n💡 **টিপস:** YouTube, Wikipedia বা Google-এ সার্চ করলে বিস্তারিত তথ্য পাবে।`;
  };

  // Markdown render — bold, numbered list, bullet
  const renderContent=(text)=>{
    const lines=text.split("\n").filter(l=>l.trim());
    return lines.map((line,i)=>{
      // Numbered list
      if(/^\d+\./.test(line.trim())){
        return <div key={i} style={{display:"flex",gap:"8px",margin:"3px 0"}}>
          <span style={{color:"#845ef7",fontWeight:700,fontSize:"12px",flexShrink:0}}>{line.trim().match(/^\d+/)[0]}.</span>
          <span style={{color:"rgba(255,255,255,0.85)",fontSize:"12px",lineHeight:"1.7"}}>{renderBold(line.trim().replace(/^\d+\.\s*/,""))}</span>
        </div>;
      }
      // Bullet list
      if(/^[-•*]/.test(line.trim())){
        return <div key={i} style={{display:"flex",gap:"8px",margin:"3px 0"}}>
          <span style={{color:"#845ef7",fontWeight:700,fontSize:"14px",flexShrink:0,lineHeight:"1.5"}}>•</span>
          <span style={{color:"rgba(255,255,255,0.85)",fontSize:"12px",lineHeight:"1.7"}}>{renderBold(line.trim().replace(/^[-•*]\s*/,""))}</span>
        </div>;
      }
      // Empty separator
      if(!line.trim()) return <div key={i} style={{height:"6px"}}/>;
      // Normal paragraph
      return <p key={i} style={{color:"rgba(255,255,255,0.85)",fontSize:"12px",lineHeight:"1.7",margin:"0 0 6px"}}>
        {renderBold(line)}
      </p>;
    });
  };

  const renderBold=(text)=>{
    const parts=text.split(/\*\*(.+?)\*\*/g);
    return parts.map((p,j)=>j%2===1
      ?<strong key={j} style={{color:"#c4b5fd",fontWeight:700}}>{p}</strong>
      :<span key={j}>{p}</span>
    );
  };

  const allLines=ans.split("\n").filter(l=>l.trim());
  const preview=allLines.slice(0,6).join("\n");
  const showText=expanded?ans:preview;

  return(
    <div style={{background:"linear-gradient(135deg,rgba(132,94,247,0.1),rgba(92,124,250,0.06))",border:"1px solid rgba(132,94,247,0.3)",borderRadius:"18px",padding:"16px",marginBottom:"14px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
        <div style={{width:"34px",height:"34px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>🤖</div>
        <div style={{flex:1}}>
          <div style={{color:"#c4b5fd",fontSize:"14px",fontWeight:800}}>BongBrowser AI</div>
          <div style={{color:"rgba(255,255,255,0.3)",fontSize:"10px"}}>Gemini + Claude powered</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",padding:"3px 10px",borderRadius:"20px"}}>
          <span style={{color:"#fff",fontSize:"10px",fontWeight:700}}>AI ✨</span>
        </div>
      </div>

      {/* Content */}
      {loading?(
        <div style={{padding:"12px 0"}}>
          <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"8px"}}>
            {[0,0.15,0.3].map((d,i)=>(
              <div key={i} style={{width:"9px",height:"9px",borderRadius:"50%",background:"#845ef7",animation:`pulse 1.2s ease ${d}s infinite`}}/>
            ))}
            <span style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",marginLeft:"6px"}}>উত্তর তৈরি হচ্ছে...</span>
          </div>
          <div style={{height:"10px",background:"rgba(132,94,247,0.1)",borderRadius:"5px",marginBottom:"6px",width:"80%"}}/>
          <div style={{height:"10px",background:"rgba(132,94,247,0.07)",borderRadius:"5px",marginBottom:"6px",width:"90%"}}/>
          <div style={{height:"10px",background:"rgba(132,94,247,0.05)",borderRadius:"5px",width:"60%"}}/>
        </div>
      ):(
        <div>
          <div style={{borderLeft:"3px solid #845ef7",paddingLeft:"12px"}}>
            {renderContent(showText)}
          </div>
          {allLines.length>6&&(
            <button onClick={()=>setExpanded(p=>!p)}
              style={{marginTop:"10px",background:"rgba(132,94,247,0.15)",border:"1px solid rgba(132,94,247,0.3)",color:"#c4b5fd",fontSize:"12px",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:700,padding:"6px 16px",borderRadius:"20px",width:"100%"}}>
              {expanded?"▲ কম দেখাও":"▼ সম্পূর্ণ উত্তর দেখো"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

  const getR=(q,tab)=>{
    const e=encodeURIComponent(q);
    if(tab==="images")return[
      {t:`${q} - Google Images`,type:"ext",url:`https://www.google.com/search?q=${e}&tbm=isch`,d:`Google-এ ${q} ছবি দেখুন`,icon:"🖼️"},
      {t:`${q} - Wikipedia ছবি`,type:"ext",url:`https://bn.wikipedia.org/wiki/${e}`,d:`Wikipedia-তে ${q}`,icon:"📖"},
      {t:`${q} HD Photos`,type:"ext",url:`https://unsplash.com/s/photos/${e}`,d:`Unsplash-এ HD ছবি`,icon:"📷"},
      {t:`${q} Images`,type:"ext",url:`https://www.google.com/search?q=${e}+photos&tbm=isch`,d:`আরও ছবি`,icon:"📸"},
    ];
    if(tab==="videos")return[
      {t:`${q} - YouTube`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}`,d:`YouTube-এ ${q} ভিডিও দেখুন`,icon:"🎬",badge:"YouTube"},
      {t:`${q} Full Movie`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}+full+movie`,d:`YouTube-এ পুরো সিনেমা`,icon:"🎥",badge:"YouTube"},
      {t:`${q} Official Video`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}+official`,d:`Official ভিডিও`,icon:"▶️",badge:"YouTube"},
      {t:`${q} - Bongo`,type:"ext",url:`https://bongobd.com/search?q=${e}`,d:`Bongo-তে দেখুন`,icon:"📺",badge:"Bongo"},
      {t:`${q} - Hoichoi`,type:"ext",url:`https://www.hoichoi.tv/search?query=${e}`,d:`Hoichoi-তে দেখুন`,icon:"🎭",badge:"Hoichoi"},
    ];
    if(tab==="music")return[
      {t:`${q} Song - YouTube`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}+song`,d:`YouTube-এ গান শুনুন`,icon:"🎵",badge:"YouTube"},
      {t:`${q} Music Video`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}+music+video`,d:`Music Video`,icon:"🎶",badge:"YouTube"},
      {t:`${q} Audio`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}+audio+song`,d:`Audio Song`,icon:"🎵",badge:"YouTube"},
      {t:`${q} - Gaana`,type:"ext",url:`https://gaana.com/search/${e}`,d:`Gaana-তে শুনুন`,icon:"🎧",badge:"Gaana"},
      {t:`${q} - JioSaavn`,type:"ext",url:`https://www.jiosaavn.com/search/${e}`,d:`JioSaavn-এ শুনুন`,icon:"🎼",badge:"Saavn"},
    ];
    if(tab==="maps")return[
      {t:`${q} - Google Maps`,type:"ext",url:`https://www.google.com/maps/search/${e}`,d:`Google Maps-এ দেখুন`,icon:"🗺️",badge:"Maps"},
      {t:`${q} কাছে`,type:"ext",url:`https://www.google.com/maps/search/${e}+near+me`,d:`কাছের ${q} খুঁজুন`,icon:"📍",badge:"Maps"},
      {t:`${q} Directions`,type:"ext",url:`https://www.google.com/maps/dir/?api=1&destination=${e}`,d:`রাস্তা খুঁজুন`,icon:"🧭",badge:"Maps"},
    ];
    if(tab==="news")return[
      {t:`${q} - Google News`,type:"ext",url:`https://news.google.com/search?q=${e}&hl=bn`,d:`সর্বশেষ খবর`,icon:"📰",badge:"News"},
      {t:`${q} - Anandabazar`,type:"ext",url:`https://www.anandabazar.com/search?q=${e}`,d:`আনন্দবাজার পত্রিকা`,icon:"📄",badge:"ABP"},
      {t:`${q} - Prothom Alo`,type:"ext",url:`https://www.prothomalo.com/search?q=${e}`,d:`প্রথম আলো`,icon:"📰",badge:"PA"},
      {t:`${q} - Eisamay`,type:"ext",url:`https://eisamay.com/search/${e}`,d:`এই সময়`,icon:"🗞️",badge:"ET"},
      {t:`${q} Today`,type:"ext",url:`https://www.google.com/search?q=${e}+today+news`,d:`আজকের খবর`,icon:"📡",badge:"Google"},
    ];
    if(tab==="shopping")return[
      {t:`${q} - Amazon`,type:"ext",url:`https://www.amazon.in/s?k=${e}`,d:`Amazon India-তে কিনুন`,icon:"🛍️",badge:"Amazon",price:"Free delivery"},
      {t:`${q} - Flipkart`,type:"ext",url:`https://www.flipkart.com/search?q=${e}`,d:`Flipkart-এ কিনুন`,icon:"🛒",badge:"Flipkart",price:"Fast delivery"},
      {t:`${q} - Meesho`,type:"ext",url:`https://www.meesho.com/search?q=${e}`,d:`Meesho-তে সস্তায় কিনুন`,icon:"👗",badge:"Meesho",price:"সস্তা"},
      {t:`${q} - Myntra`,type:"ext",url:`https://www.myntra.com/${encodeURIComponent(q)}`,d:`Myntra Fashion`,icon:"👠",badge:"Myntra"},
      {t:`${q} - Snapdeal`,type:"ext",url:`https://www.snapdeal.com/search?keyword=${e}`,d:`Snapdeal-এ কিনুন`,icon:"🏷️",badge:"Snapdeal"},
      {t:`${q} - Nykaa`,type:"ext",url:`https://www.nykaa.com/search/result/?q=${e}`,d:`Nykaa Beauty`,icon:"💄",badge:"Nykaa"},
    ];
    // All/default
    return[
      {t:`${q} - Wikipedia বাংলা`,type:"ext",url:`https://bn.wikipedia.org/wiki/${e}`,d:`বাংলা Wikipedia-তে পড়ুন`,icon:"📖",badge:"Wiki"},
      {t:`${q} Video - YouTube`,type:"ext",url:`https://www.youtube.com/results?search_query=${e}`,d:`YouTube-এ ভিডিও দেখুন`,icon:"🎬",badge:"YouTube"},
      {t:`${q} - Google Search`,type:"ext",url:`https://www.google.com/search?q=${e}`,d:`Google-এ search করুন`,icon:"🔍",badge:"Google"},
      {t:`${q} - Google News`,type:"ext",url:`https://news.google.com/search?q=${e}&hl=bn`,d:`সর্বশেষ খবর`,icon:"📰",badge:"News"},
      {t:`${q} Images`,type:"ext",url:`https://www.google.com/search?q=${e}&tbm=isch`,d:`Google Images`,icon:"🖼️",badge:"Images"},
      {t:`${q} - Amazon`,type:"ext",url:`https://www.amazon.in/s?k=${e}`,d:`Amazon-এ কিনুন`,icon:"🛍️",badge:"Amazon"},
    ];
  };

  // YouTube URL হলে App-এ, বাকি সব Chrome-এ
  const openYT=(url)=>{
    // Android intent — YouTube App-এ সরাসরি খুলবে
    const intent=`intent://${url.replace("https://","").replace("http:/","")}#Intent;package=com.google.android.youtube;scheme=https;end`;
    window.location.href=intent;
    // 800ms পরে fallback — YouTube web
    setTimeout(()=>window.open(url,"_blank"),800);
  };

  const handleClick=(r)=>{
    const url=r.url;
    if(url.includes("youtube.com")||url.includes("youtu.be")){
      openYT(url);
    } else {
      window.open(url,"_blank");
    }
  };

  const search=(q,tab)=>{
    const sq=q!==undefined?q:query;
    const st=tab||activeTab;
    if(!sq.trim())return;
    setSearched(true);setLoading(true);setImgErrors({});
    setSearchHistory(p=>[{query:sq,user:user?user.phone:"guest",ts:Date.now()},...p.slice(0,49)]);
    setTimeout(()=>{setResults(getR(sq,st));setLoading(false);},600);
  };

  return(
    <div>
      {browserUrl&&<BrowserView url={browserUrl} onClose={()=>setBrowserUrl(null)}/>}
      {photoUrl&&<PhotoViewer url={photoUrl} onClose={()=>setPhotoUrl(null)}/>}

          <span style={{color:"#fff",fontSize:"12px",fontWeight:800}}>BongBrowser Search</span>

        <p style={{color:"rgba(255,255,255,0.25)",fontSize:"9px",margin:"4px 0 0"}}>History শুধু BongBrowser-এ • Google Chrome-এ যাবে না</p>
      </div>

      <div style={{display:"flex",gap:"7px",marginBottom:"10px"}}>
        <div style={{flex:1,position:"relative"}}>
          <span style={{position:"absolute",left:"11px",top:"50%",transform:"translateY(-50%)",fontSize:"14px"}}>🔍</span>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="BongBrowser-এ search করুন..."
            style={{width:"100%",padding:"11px 11px 11px 33px",background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:"12px",color:"#fff",fontSize:"13px",fontFamily:"'Inter',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <button onClick={()=>search()} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",border:"none",borderRadius:"12px",padding:"0 14px",color:"#fff",fontSize:"16px",cursor:"pointer"}}>→</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:"5px",overflowX:"auto",paddingBottom:"6px",marginBottom:"10px"}}>
        {STABS.map(tab=>(
          <button key={tab.key} onClick={()=>{setActiveTab(tab.key);if(searched&&query.trim())search(query,tab.key);}}
            style={{padding:"6px 11px",border:"none",borderRadius:"50px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:700,background:activeTab===tab.key?"linear-gradient(135deg,#845ef7,#5c7cfa)":"rgba(255,255,255,0.06)",color:activeTab===tab.key?"#fff":"rgba(255,255,255,0.5)",flexShrink:0,transition:"all 0.2s"}}>
            {tab.icon} {tab.label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"24px 0"}}>
        <div style={{width:"32px",height:"32px",border:"3px solid rgba(132,94,247,0.2)",borderTop:"3px solid #845ef7",borderRadius:"50%",margin:"0 auto 8px",animation:"spin 0.8s linear infinite"}}/>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",margin:0}}>BongBrowser Search করছে...</p>
      </div>}

      {!loading&&searched&&(
        <>
          {(activeTab==="all"||activeTab==="ai")&&<AIAnswer query={query}/>}
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",marginBottom:"10px"}}>"{query}" — {results.length}টি results • Chrome-এ খুলবে ↗</p>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {results.map((r,i)=>(
              <div key={i} onClick={()=>handleClick(r)}
                style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"12px 13px",cursor:"pointer",transition:"all 0.15s",display:"flex",gap:"11px",alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.09)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                <div style={{width:"36px",height:"36px",background:"rgba(132,94,247,0.15)",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{r.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:"0 0 2px",color:"#c4b5fd",fontSize:"12px",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.t}</p>
                  <p style={{margin:0,color:"rgba(255,255,255,0.42)",fontSize:"11px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.d}</p>
                </div>
                {r.badge&&<span style={{background:r.badge==="YouTube"?"rgba(255,0,0,0.2)":"rgba(132,94,247,0.2)",color:r.badge==="YouTube"?"#ff6b6b":"#c4b5fd",fontSize:"9px",padding:"2px 7px",borderRadius:"50px",fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{r.badge==="YouTube"?"▶ YT App":r.badge}</span>}
                <span style={{color:"rgba(255,255,255,0.3)",fontSize:"14px",flexShrink:0}}>↗</span>
              </div>
            ))}
          </div>
        </>
      )}

      {!searched&&(
        <div>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",fontWeight:600,marginBottom:"10px"}}>🔥 জনপ্রিয় Search</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
            {["বাংলা সিনেমা","IPL 2025","Free Fire","Shakib Khan","Recipe bangla","Cricket","Weather","Prosenjit","Jeet","Tollywood"].map((s,i)=>(
              <button key={i} onClick={()=>{setQuery(s);setTimeout(()=>search(s),50);}}

                🔍 {s}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

    const e={};
    if(!form.name.trim())e.name="নাম দিন";
    if(!form.email.includes("@"))e.email="সঠিক Email দিন";
    if(form.password.length<6)e.password="কমপক্ষে ৬ অক্ষর";
    if(registeredUsers.find(u=>u.email===form.email))e.email="এই Email আগেই registered!";
    setErrors(e);return Object.keys(e).length===0;
  };

  const valLogin=()=>{
    const e={};
    if(!form.email.includes("@"))e.email="সঠিক Email দিন";
    if(!form.password)e.password="Password দিন";
    setErrors(e);return Object.keys(e).length===0;

    if(!valReg())return;
    setLoading(true);
    const code=Math.floor(100000+Math.random()*900000).toString();

    setStep("otp");
    setLoading(false);

        <h2 style={{color:"#fff",fontSize:"18px",fontWeight:800,margin:"0 0 3px"}}>BongBrowser</h2>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:"11px",margin:0}}>আপনার নিজের Browser</p>
      </div>

      {/* Mode Tabs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:"rgba(0,0,0,0.3)",borderRadius:"12px",padding:"4px",marginBottom:"16px",gap:"3px"}}>
        {[["login","🔑","Login"],["register","📝","Register"],["admin","🔐","Admin"]].map(([m,icon,l])=>(
          <button key={m} onClick={()=>{setMode(m);setStep("form");setErrors({});setAdminError("");}}
            style={{padding:"9px 4px",border:"none",borderRadius:"10px",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:"12px",fontWeight:700,background:mode===m?"linear-gradient(135deg,#845ef7,#5c7cfa)":"transparent",color:mode===m?"#fff":"rgba(255,255,255,0.4)",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
            <span>{icon}</span><span>{l}</span>
          </button>
        ))}
      </div>

      {mode!=="admin"&&(
        <>
          <button onClick={handleGoogle} disabled={gLoading}
            style={{width:"100%",padding:"12px",background:"#fff",border:"none",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",cursor:gLoading?"not-allowed":"pointer",marginBottom:"14px",fontWeight:700,fontSize:"14px",color:"#333",boxShadow:"0 2px 12px rgba(0,0,0,0.3)",opacity:gLoading?0.7:1,fontFamily:"'Inter',sans-serif"}}>
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            {gLoading?"লোড হচ্ছে...":"Continue with Google"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
            <div style={{flex:1,height:"1px",background:"rgba(255,255,255,0.1)"}}/>
            <span style={{color:"rgba(255,255,255,0.25)",fontSize:"11px"}}>অথবা Email দিয়ে</span>
            <div style={{flex:1,height:"1px",background:"rgba(255,255,255,0.1)"}}/>
          </div>
        </>
      )}

      {/* REGISTER */}
      {mode==="register"&&step==="form"&&(
        <>
          {[["name","নাম","আপনার নাম","text"],["email","Email","example@gmail.com","email"]].map(([k,label,ph,type])=>(
            <div key={k} style={{marginBottom:"10px"}}>
              <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>{label}</label>
              <input style={inp(errors,k)} placeholder={ph} type={type} value={form[k]} onChange={e=>setF(k,e.target.value)}/>
              {errors[k]&&<p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors[k]}</p>}
            </div>
          ))}
          <div style={{marginBottom:"14px"}}>
            <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>Password</label>
            <div style={{position:"relative"}}>
              <input style={inp(errors,"password")} placeholder="কমপক্ষে ৬ অক্ষর" type={showPass?"text":"password"} value={form.password} onChange={e=>setF("password",e.target.value)}/>
              <span onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:"15px"}}>{showPass?"🙈":"👁"}</span>
            </div>
            {errors.password&&<p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.password}</p>}
          </div>
          <button onClick={sendOTP} disabled={loading} style={{...btn,background:loading?"rgba(132,94,247,0.5)":btn.background}}>
            {loading?"পাঠানো হচ্ছে...":"Email OTP পাঠান →"}
          </button>
        </>
      )}

      {/* OTP */}
      {mode==="register"&&step==="otp"&&(
        <>
          <div style={{background:"rgba(132,94,247,0.1)",border:"1px solid rgba(132,94,247,0.25)",borderRadius:"14px",padding:"16px",marginBottom:"14px",textAlign:"center"}}>
            <div style={{fontSize:"28px",marginBottom:"6px"}}>📧</div>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",margin:"0 0 4px"}}>OTP পাঠানো হয়েছে</p>
            <p style={{color:"#c4b5fd",fontWeight:700,fontSize:"14px",margin:"0 0 8px"}}>{form.email}</p>
            <div style={{background:"rgba(245,159,0,0.15)",border:"1px solid rgba(245,159,0,0.3)",borderRadius:"10px",padding:"8px"}}>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:"10px",margin:"0 0 3px"}}>আপনার OTP:</p>
              <p style={{color:"#f59f00",fontFamily:"monospace",fontSize:"22px",fontWeight:800,margin:0,letterSpacing:"6px"}}>{genOtp}</p>
            </div>
          </div>
          <div style={{marginBottom:"14px"}}>
            <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>6-digit OTP</label>
            <input style={inp(errors,"otp")} placeholder="• • • • • •" type="number" value={otp} onChange={e=>setOtp(e.target.value.slice(0,6))}/>
            {errors.otp&&<p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.otp}</p>}
          </div>

// ── DOWNLOAD ───────────────────────────────────────────────
function DownloadPage(){
  const [url,setUrl]=useState("");
  const [downloads,setDownloads]=useState(()=>{try{return JSON.parse(localStorage.getItem("bb_downloads")||"[]");}catch{return [];}});
  const [err,setErr]=useState("");

  const isValidUrl=(u)=>{try{new URL(u);return true;}catch{return false;}};

  const start=()=>{
    const u=url.trim();
    if(!u){setErr("Link দিন");return;}
    if(!isValidUrl(u)){setErr("সঠিক URL দিন (https:// দিয়ে শুরু)");return;}
    setErr("");
    const name=u.split("/").pop().split("?")[0]||"file_"+Date.now();
    const ext=name.split(".").pop().toLowerCase();

    // Real download — browser handle করবে
    const a=document.createElement("a");
    a.href=u;
    a.download=name;
    a.target="_blank";
    a.rel="noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // History save
    const item={id:Date.now(),name,url:u,ext,time:Date.now()};
    const updated=[item,...downloads.slice(0,19)];
    setDownloads(updated);
    localStorage.setItem("bb_downloads",JSON.stringify(updated));
    setUrl("");
  };

  const getIcon=(ext)=>{
    if(["apk","xapk"].includes(ext))return"📦";
    if(["jpg","jpeg","png","gif","webp"].includes(ext))return"🖼️";
    if(["mp4","mkv","avi","webm"].includes(ext))return"🎬";
    if(["mp3","m4a","wav","ogg"].includes(ext))return"🎵";
    if(["pdf"].includes(ext))return"📄";
    if(["zip","rar","7z"].includes(ext))return"🗜️";
    return"📥";
  };

  const ft=(ts)=>new Date(ts).toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});

  return(
    <div>
      {/* Header */}
      <div style={{textAlign:"center",marginBottom:"14px"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:"7px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"11px",padding:"5px 14px",marginBottom:"4px"}}>
          <span style={{fontSize:"14px"}}>📥</span>
          <span style={{color:"#fff",fontSize:"12px",fontWeight:800}}>BongBrowser Download</span>
        </div>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:"9px"}}>APK, Video, Image, PDF সব download হবে</p>
      </div>

      {/* Input */}
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"16px",padding:"14px",marginBottom:"12px"}}>
        <label style={{display:"block",color:"rgba(255,255,255,0.5)",fontSize:"11px",fontWeight:600,marginBottom:"7px"}}>📎 Download Link</label>
        <input value={url} onChange={e=>{setUrl(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&start()}
          placeholder="https://example.com/file.apk"
          style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.06)",border:`1.5px solid ${err?"#ff5050":"rgba(255,255,255,0.12)"}`,borderRadius:"11px",color:"#fff",fontSize:"13px",fontFamily:"'Inter',sans-serif",outline:"none",marginBottom:"8px",boxSizing:"border-box"}}/>
        {err&&<p style={{color:"#ff6b6b",fontSize:"11px",margin:"0 0 8px",fontWeight:600}}>⚠ {err}</p>}

        {/* Quick categories */}
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",margin:"0 0 7px",fontWeight:600}}>⚡ যা download করা যাবে:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px"}}>
          {[["📦","APK"],["🎬","Video"],["🎵","Music"],["🖼️","Image"],["📄","PDF"],["🗜️","ZIP"]].map(([icon,label])=>(
            <span key={label} style={{background:"rgba(132,94,247,0.1)",border:"1px solid rgba(132,94,247,0.2)",borderRadius:"20px",padding:"3px 10px",color:"#c4b5fd",fontSize:"10px",fontWeight:600}}>{icon} {label}</span>
          ))}
        </div>

        <button onClick={start}
          style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"11px",padding:"13px",fontSize:"14px",fontWeight:700,width:"100%",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
          ⬇ Download শুরু করুন
        </button>
      </div>

      {/* Info box */}
      <div style={{background:"rgba(52,199,89,0.08)",border:"1px solid rgba(52,199,89,0.2)",borderRadius:"12px",padding:"10px 13px",marginBottom:"12px"}}>
        <p style={{color:"#34c759",fontSize:"11px",fontWeight:700,margin:"0 0 4px"}}>✅ কীভাবে কাজ করে:</p>
        <p style={{color:"rgba(255,255,255,0.5)",fontSize:"10px",lineHeight:"1.6",margin:0}}>Link paste করুন → Download button চাপুন → Chrome বা Files app-এ download হবে। বড় file হলে একটু সময় লাগতে পারে।</p>
      </div>

      {/* Download History */}

// ── MAIN APP ───────────────────────────────────────────────
// localStorage helpers for session persistence
const saveSession=(user)=>{try{localStorage.setItem("bb_session",JSON.stringify(user));}catch(e){}};
const loadSession=()=>{try{const s=localStorage.getItem("bb_session");return s?JSON.parse(s):null;}catch(e){return null;}};
const clearSession=()=>{try{localStorage.removeItem("bb_session");}catch(e){}};

function App(){
  const privacyAgreed=()=>{try{return localStorage.getItem("bb_privacy")==="1";}catch(e){return false;}};
  // Privacy agreement check
  const [agreedPrivacy,setAgreedPrivacy]=useState(()=>localStorage.getItem("bb_privacy_agreed")==="yes");
  const [screen,setScreen]=useState(()=>loadSession()?"main":"auth");
  const [showPrivacyGate,setShowPrivacyGate]=useState(()=>!privacyAgreed());
  const [tab,setTab]=useState("home");
  const [currentUser,setCurrentUser]=useState(()=>loadSession());
  const [registeredUsers,setRegisteredUsers]=useState([]);
  const [adminEarnings,setAdminEarnings]=useState(0);
  const [searchHistory,setSearchHistory]=useState([]);
  const [isLight,setIsLight]=useState(()=>localStorage.getItem("bb_theme")==="light");

  const [showPrivacy,setShowPrivacy]=useState(false);
  const toggleTheme=()=>{
    setIsLight(p=>{
      const next=!p;
      localStorage.setItem("bb_theme",next?"light":"dark");
      return next;
    });
  };

  const themeVars=isLight?{
    "--bg":"#f0f2f8","--text":"#1a1a2e","--card":"rgba(255,255,255,0.9)",
    "--border":"rgba(0,0,0,0.1)","--sub":"rgba(0,0,0,0.4)"
  }:{
    "--bg":"#0d0d1a","--text":"#fff","--card":"rgba(255,255,255,0.03)",
    "--border":"rgba(255,255,255,0.07)","--sub":"rgba(255,255,255,0.28)"
  };

  const onAuth=(user)=>{setCurrentUser(user);saveSession(user);setTimeout(()=>setScreen("main"),600);};

  const handleLogout=async()=>{
    try{await firebase.auth().signOut();}catch(e){}
    clearSession();
    setCurrentUser(null);
    setScreen("auth");
    setTab("home");
  };

  const updateUser=(fn)=>{
    setCurrentUser(prev=>{
      const updated=fn(prev);
      saveSession(updated);
      setRegisteredUsers(all=>all.map(u=>u.id===updated.id?updated:u));
      return updated;
    });
  };

  const NAV=[["home","🏠","হোম"],["search","🔍","Search"],["games","🎮","Games"],["shop","🛍️","Shop"],["upi","💸","UPI"],["premium","👑","Pro"],["admin","🔐","Admin"]];

  // Privacy Gate - first time must agree
  if(showPrivacyGate){

          <div>

          </button>
        </div>
      </div>

          {screen==="auth"&&<AuthPage onAuth={onAuth} registeredUsers={registeredUsers} setRegisteredUsers={setRegisteredUsers} onPrivacy={()=>setShowPrivacy(true)}/>}
          {screen==="main"&&tab==="home"&&<HomePage user={currentUser} updateUser={updateUser} setAdminEarnings={setAdminEarnings} setSearchHistory={setSearchHistory} onLogout={handleLogout}/>}
          {screen==="main"&&tab==="search"&&<SearchEngine user={currentUser} setSearchHistory={setSearchHistory}/>}
          {screen==="main"&&tab==="games"&&<GamesPage/>}
          {screen==="main"&&tab==="shop"&&<ShoppingPage/>}
          {screen==="main"&&tab==="upi"&&<UPIPage user={currentUser} updateUser={updateUser}/>}
          {screen==="main"&&tab==="download"&&<DownloadPage/>}
          {screen==="main"&&tab==="premium"&&<PremiumPage user={currentUser} updateUser={updateUser}/>}
          {screen==="main"&&tab==="admin"&&<AdminPanel adminEarnings={adminEarnings} registeredUsers={registeredUsers} searchHistory={searchHistory} isAdminUser={currentUser&&currentUser.isAdmin} onLogout={handleLogout}/>}

      </div>

                <span style={{fontSize:"15px"}}>{icon}</span>
                <span>{label}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {screen==="auth"&&(
        <div style={{textAlign:"center",padding:"6px 0 14px"}}>
          <button onClick={()=>setShowPrivacy(true)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",fontSize:"11px",cursor:"pointer",fontFamily:"'Inter',sans-serif",textDecoration:"underline"}}>🔒 Privacy Policy</button>
        </div>
      )}
