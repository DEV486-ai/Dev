    // ── AUTH PAGE ──────────────────────────────────────────────
    function AuthPage({ onAuth, registeredUsers, setRegisteredUsers }) {
      const [mode, setMode] = useState("login");
      const [step, setStep] = useState("form");
      const [form, setForm] = useState({ name:"", phone:"", email:"", password:"" });
      const [otp, setOtp] = useState("");
      const [demoOtp] = useState(Math.floor(100000+Math.random()*900000).toString());
      const [errors, setErrors] = useState({});
      const [showPass, setShowPass] = useState(false);

      const setF = (k,v) => { setForm(p=>({...p,[k]:v})); setErrors(p=>({...p,[k]:""})); };

      const validateReg = () => {
        const e={};
        if(!form.name.trim()) e.name="নাম দিন";
        if(!/^[6-9]\d{9}$/.test(form.phone)) e.phone="সঠিক ১০ সংখ্যার নম্বর দিন";
        if(!form.email.includes("@")) e.email="সঠিক Email দিন";
        if(form.password.length<6) e.password="কমপক্ষে ৬ অক্ষর";
        if(registeredUsers.find(u=>u.phone===form.phone)) e.phone="এই নম্বর আগেই registered!";
        setErrors(e); return Object.keys(e).length===0;
      };

      const validateLogin = () => {
        const e={};
        if(!/^[6-9]\d{9}$/.test(form.phone)) e.phone="সঠিক নম্বর দিন";
        if(!form.password) e.password="Password দিন";
        setErrors(e); return Object.keys(e).length===0;
      };

      const [googleLoading, setGoogleLoading] = useState(false);

      const handleGoogleLogin = async () => {
        setGoogleLoading(true);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.addScope('email');
          provider.addScope('profile');
          // Try popup first, fallback to redirect on mobile
          try {
            const result = await firebase.auth().signInWithPopup(provider);
            const gUser = result.user;
            const googleUser = {
              id: gUser.uid,
              name: gUser.displayName || "Google User",
              phone: gUser.phoneNumber || "0000000000",
              email: gUser.email,
              photoURL: gUser.photoURL,
              password: "",
              balance: 10,
              adsWatched: 0,
              plan: "free",
              joinedAt: Date.now(),
              status: "active",
              txHistory: [],
              loginMethod: "google",
            };
            setRegisteredUsers(p => {
              const ex = p.find(u => u.email === googleUser.email);
              return ex ? p : [...p, googleUser];
            });
            onAuth(googleUser);
          } catch (popupError) {
            // Popup failed, use redirect
            await firebase.auth().signInWithRedirect(provider);
          }
        } catch (error) {
          alert("Google login সম্পন্ন হয়নি। আবার চেষ্টা করুন।");
          setGoogleLoading(false);
        }
      };

      const handleOtp = () => {
        if(otp.length!==6){ setErrors({otp:"৬ সংখ্যার OTP দিন"}); return; }
        const user = { id:Date.now(), ...form, balance:0, adsWatched:0, plan:"free", joinedAt:Date.now(), status:"active", txHistory:[], loginMethod:"phone" };
        setRegisteredUsers(p=>[...p,user]);
        onAuth(user);
      };

      const handleLogin = () => {
        if(!validateLogin()) return;
        const user = registeredUsers.find(u=>u.phone===form.phone&&u.password===form.password);
        if(!user){ setErrors({password:"Phone বা Password ভুল!"}); return; }
        onAuth(user);
      };

      return (

              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            {googleLoading ? "লোড হচ্ছে..." : "Continue with Google"}

          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>

            <span style={{color:"rgba(255,255,255,0.25)",fontSize:"11px"}}>অথবা</span>
            <div style={{flex:1,height:"1px",background:"rgba(255,255,255,0.1)"}}/>
          </div>

          <div style={{display:"flex",background:"rgba(0,0,0,0.3)",borderRadius:"12px",padding:"4px",marginBottom:"16px"}}>

            <>
              {[["name","নাম","Rahul Das","text"],["phone","Mobile Number","9XXXXXXXXX","tel"],["email","Email","example@gmail.com","email"]].map(([k,label,ph,type])=>(

                      <input style={{...inp(errors,k),paddingLeft:"44px"}} placeholder={ph} type="tel" maxLength={10} value={form[k]} onChange={e=>setF(k,e.target.value.replace(/\D/g,""))}/>

                    <input style={inp(errors,k)} placeholder={ph} type={type} value={form[k]} onChange={e=>setF(k,e.target.value)}/>

                <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>Password</label>
                <div style={{position:"relative"}}>
                  <input style={inp(errors,"password")} placeholder="কমপক্ষে ৬ অক্ষর" type={showPass?"text":"password"} value={form.password} onChange={e=>setF("password",e.target.value)}/>
                  <span onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:"15px"}}>{showPass?"🙈":"👁"}</span>
                </div>
                {errors.password && <p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.password}</p>}
              </div>
              <button onClick={()=>{if(validateReg())setStep("otp");}} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px",fontSize:"14px",fontWeight:700,width:"100%",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>
                OTP পাঠান →
              </button>
            </>
          )}

          {mode==="register" && step==="otp" && (
            <>
              <div style={{background:"rgba(132,94,247,0.1)",border:"1px solid rgba(132,94,247,0.25)",borderRadius:"12px",padding:"12px",marginBottom:"14px",textAlign:"center"}}>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",margin:"0 0 3px"}}>OTP পাঠানো হয়েছে</p>
                <p style={{color:"#c4b5fd",fontWeight:700,fontSize:"14px",margin:"0 0 5px"}}>+91 {form.phone}</p>
                <p style={{color:"rgba(255,255,255,0.25)",fontSize:"10px",margin:0}}>Demo OTP: <span style={{color:"#f59f00",fontFamily:"monospace",fontWeight:700}}>{demoOtp}</span></p>
              </div>
              <div style={{marginBottom:"14px"}}>
                <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>6-digit OTP</label>
                <input style={inp(errors,"otp")} placeholder="• • • • • •" type="number" value={otp} onChange={e=>setOtp(e.target.value.slice(0,6))}/>
                {errors.otp && <p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.otp}</p>}
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>setStep("form")} style={{flex:1,background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"12px",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>← ফিরুন</button>
                <button onClick={handleOtp} style={{flex:2,background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"12px",padding:"12px",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>Verify ✓</button>
              </div>
            </>
          )}

          {mode==="login" && (
            <>
              <div style={{marginBottom:"10px"}}>
                <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>Mobile Number</label>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:"12px",top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.4)",fontSize:"13px"}}>+91</span>
                  <input style={{...inp(errors,"phone"),paddingLeft:"44px"}} placeholder="9XXXXXXXXX" type="tel" maxLength={10} value={form.phone} onChange={e=>setF("phone",e.target.value.replace(/\D/g,""))}/>
                </div>
                {errors.phone && <p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.phone}</p>}
              </div>
              <div style={{marginBottom:"16px"}}>
                <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>Password</label>
                <div style={{position:"relative"}}>
                  <input style={inp(errors,"password")} placeholder="••••••" type={showPass?"text":"password"} value={form.password} onChange={e=>setF("password",e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
                  <span onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:"15px"}}>{showPass?"🙈":"👁"}</span>
                </div>
                {errors.password && <p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors.password}</p>}
              </div>
              <button onClick={handleLogin} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px",fontSize:"14px",fontWeight:700,width:"100%",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>
                Login করুন 🔑
              </button>
            </>
          )}
        </div>
      );
    }

    // ── SEARCH ENGINE ──────────────────────────────────────────
    const SEARCH_TABS = [
      { key:"all", label:"সব", icon:"🔍", url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}` },
      { key:"ai", label:"AI", icon:"🤖", url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}&udm=50` },
      { key:"images", label:"ছবি", icon:"🖼️", url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=isch` },
      { key:"videos", label:"ভিডিও", icon:"🎬", url: q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}` },
      { key:"news", label:"News", icon:"📰", url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=nws` },
      { key:"shopping", label:"Shopping", icon:"🛒", url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=shop` },
      { key:"maps", label:"Maps", icon:"🗺️", url: q => `https://www.google.com/maps/search/${encodeURIComponent(q)}` },
      { key:"sites", label:"Sites", icon:"🌐", url: q => `https://www.google.com/search?q=site:${encodeURIComponent(q)}` },
    ];

    function SearchEngine({ user, setSearchHistory }) {
      const [query, setQuery] = useState("");
      const [activeTab, setActiveTab] = useState("all");
      const [searched, setSearched] = useState(false);
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);

      const getFakeResults = (q, tab) => {
        const base = [
          { title:`${q} - সম্পূর্ণ তথ্য | BongBrowser`, url:`https://bn.wikipedia.org/wiki/${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে বিস্তারিত তথ্য পড়ুন।`, icon:"🌐" },
          { title:`${q} কি? বাংলায় জানুন`, url:`https://bn.wikipedia.org/wiki/${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে বাংলায় সহজ ব্যাখ্যা।`, icon:"📖" },
          { title:`Latest ${q} 2024`, url:`https://www.google.com/search?q=${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে সর্বশেষ তথ্য।`, icon:"📰" },
          { title:`${q} - Wikipedia`, url:`https://bn.wikipedia.org/wiki/${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে Wikipedia-তে পড়ুন।`, icon:"📚" },
          { title:`${q} Video`, url:`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে video দেখুন।`, icon:"🎬" },
          { title:`${q} - আরও জানুন`, url:`https://www.google.com/search?q=${encodeURIComponent(q)}`, desc:`${q} সম্পর্কে আরও তথ্য।`, icon:"🔍" },
        ];
        if(tab==="images") return base.map(r=>({...r, icon:"🖼️", url:`https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=isch`}));
        if(tab==="videos") return base.map(r=>({...r, icon:"🎬", url:`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`}));
        if(tab==="news") return base.map(r=>({...r, icon:"📰", url:`https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=nws`}));
        if(tab==="shopping") return base.map(r=>({...r, icon:"🛒", url:`https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=shop`}));
        if(tab==="maps") return [{title:`${q} - Google Maps`, url:`https://www.google.com/maps/search/${encodeURIComponent(q)}`, desc:`${q} Maps-এ দেখুন।`, icon:"🗺️"}];
        if(tab==="ai") return base.map(r=>({...r, icon:"🤖", url:`https://www.google.com/search?q=${encodeURIComponent(q)}&udm=50`}));
        return base;
      };

      const handleSearch = (q, tab) => {
        const sq = q !== undefined ? q : query;
        const st = tab || activeTab;
        if(!sq.trim()) return;
        setSearched(true); setLoading(true);
        setSearchHistory(p=>[{query:sq,user:user.phone,ts:Date.now()},...p.slice(0,49)]);
        setTimeout(() => { setResults(getFakeResults(sq, st)); setLoading(false); }, 700);
      };

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        if(searched && query.trim()) handleSearch(query, tab);
      };

      return (
        <div>
          {/* Header */}
          <div style={{textAlign:"center",marginBottom:"14px"}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:"8px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"12px",padding:"6px 14px",marginBottom:"6px"}}>
              <span style={{fontSize:"14px"}}>🌐</span>
              <span style={{color:"#fff",fontSize:"13px",fontWeight:800,letterSpacing:"0.3px"}}>BongBrowser Search</span>
            </div>
          </div>

          {/* Search Bar */}
          <div style={{display:"flex",gap:"7px",marginBottom:"10px"}}>
            <div style={{flex:1,position:"relative"}}>
              <span style={{position:"absolute",left:"12px",top:"50%",transform:"translateY(-50%)",fontSize:"15px"}}>🔍</span>
              <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSearch()} placeholder="BongBrowser-এ search করুন..."
                style={{width:"100%",padding:"12px 12px 12px 36px",background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:"13px",color:"#fff",fontSize:"14px",fontFamily:"'Noto Sans Bengali',sans-serif",outline:"none",boxSizing:"border-box"}}/>
            </div>
            <button onClick={()=>handleSearch()} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",border:"none",borderRadius:"13px",padding:"0 16px",color:"#fff",fontSize:"16px",cursor:"pointer",boxShadow:"0 4px 12px rgba(132,94,247,0.4)"}}>→</button>
          </div>

          {/* Google-style Tabs */}
          <div style={{display:"flex",gap:"4px",overflowX:"auto",paddingBottom:"8px",marginBottom:"10px"}}>
            {SEARCH_TABS.map(tab=>(
              <button key={tab.key} onClick={()=>handleTabChange(tab.key)}
                style={{padding:"7px 12px",border:"none",borderRadius:"50px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Noto Sans Bengali',sans-serif",fontSize:"11px",fontWeight:700,transition:"all 0.2s",background:activeTab===tab.key?"linear-gradient(135deg,#845ef7,#5c7cfa)":"rgba(255,255,255,0.06)",color:activeTab===tab.key?"#fff":"rgba(255,255,255,0.5)",boxShadow:activeTab===tab.key?"0 3px 10px rgba(132,94,247,0.4)":"none",flexShrink:0}}>
                {tab.icon} {tab.label}
              </button>
            ))}
          </div>

          {/* Loading */}
          {loading && (
            <div style={{textAlign:"center",padding:"28px 0"}}>
              <div style={{width:"34px",height:"34px",border:"3px solid rgba(132,94,247,0.2)",borderTop:"3px solid #845ef7",borderRadius:"50%",margin:"0 auto 10px",animation:"spin 0.8s linear infinite"}}/>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",margin:0}}>BongBrowser Search করছে...</p>
            </div>
          )}

          {/* Results */}
          {!loading && searched && (
            <>
              <p style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",marginBottom:"10px"}}>"{query}" — {results.length}টি results</p>
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {results.map((r,i)=>(
                  <div key={i} onClick={()=>window.open(r.url,"_blank")}
                    style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"12px 13px",cursor:"pointer",transition:"all 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
                    onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                    <div style={{display:"flex",gap:"10px"}}>
                      <div style={{width:"30px",height:"30px",background:"rgba(132,94,247,0.15)",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0}}>{r.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:"0 0 2px",color:"#c4b5fd",fontSize:"12px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</p>
                        <p style={{margin:"0 0 3px",color:"rgba(255,255,255,0.22)",fontSize:"9px"}}>🌐 bongbrowser.search</p>
                        <p style={{margin:0,color:"rgba(255,255,255,0.45)",fontSize:"10px",lineHeight:"1.4"}}>{r.desc}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {/* Open in full browser */}
              <button onClick={()=>window.open(SEARCH_TABS.find(t=>t.key===activeTab).url(query),"_blank")}
                style={{width:"100%",marginTop:"12px",padding:"11px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",color:"rgba(255,255,255,0.5)",fontSize:"12px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif",fontWeight:600}}>
                🌐 সম্পূর্ণ results দেখুন →
              </button>
            </>
          )}

          {/* Initial suggestions */}
          {!searched && (
            <div>
              <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",fontWeight:600,marginBottom:"10px"}}>জনপ্রিয় Search</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
                {["বাংলা সিনেমা","IPL 2024","Free recharge","Recipe bangla","Tech news","Cricket score","Weather today","Bollywood songs"].map((s,i)=>(
                  <button key={i} onClick={()=>{setQuery(s);setTimeout(()=>handleSearch(s),50);}}
                    style={{padding:"7px 12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"50px",color:"rgba(255,255,255,0.55)",fontSize:"11px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>
                    🔍 {s}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── HOME ───────────────────────────────────────────────────

    // ── UPI ────────────────────────────────────────────────────

              <h2 style={{color:"#fff",fontSize:"17px",fontWeight:700,margin:"0 0 4px"}}>সফল! 🎉</h2>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",margin:"0 0 2px"}}><span style={{color:"#c4b5fd"}}>{form.name}</span>-কে</p>
              <p style={{fontSize:"28px",fontWeight:800,margin:"0 0 16px",fontFamily:"monospace",color:"#34c759"}}>₹{Number(form.amount).toLocaleString("en-IN")}</p>
              <button onClick={()=>{setStep("form");setForm({name:"",amount:"",upi:""}); }} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"11px",padding:"11px",fontSize:"13px",fontWeight:700,width:"100%",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>আরও পাঠান</button>
            </div>

    function DownloadPage() {
      const [url, setUrl] = useState("");
      const [saveTo, setSaveTo] = useState("phone");
      const [downloads, setDownloads] = useState([]);
      const [progress, setProgress] = useState(0);
      const [downloading, setDownloading] = useState(false);
      const start = () => {
        if(!url.trim()) return;
        const name=url.split("/").pop()||"file_"+Date.now();
        setDownloading(true); setProgress(0);
        const iv=setInterval(()=>{
          setProgress(p=>{
            if(p>=100){clearInterval(iv);setDownloading(false);setDownloads(prev=>[{id:Date.now(),name,status:"done",saveTo},...prev]);setUrl("");return 0;}
            return Math.min(100,p+Math.random()*18);
          });
        },300);
      };
      return (
        <div>
          <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"18px",padding:"16px",marginBottom:"12px"}}>

                ))}
              </div>
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"13px",padding:"12px"}}>
                <p style={{color:"rgba(255,255,255,0.35)",fontSize:"10px",margin:"0 0 4px"}}>Users মোট পেয়েছে</p>
                <p style={{color:"#c4b5fd",fontSize:"20px",fontWeight:800,margin:0,fontFamily:"monospace"}}>₹{registeredUsers.reduce((s,u)=>s+u.balance,0)}</p>
              </div>
            </div>
          )}
          {section==="searches"&&(
            <div>
              {searchHistory.length===0?(
                <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.2)"}}>
                  <div style={{fontSize:"28px",marginBottom:"6px"}}>🔍</div>
                  <p style={{margin:0,fontSize:"12px"}}>কোনো search নেই</p>
                </div>
              ):searchHistory.map((h,i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"10px",padding:"9px 12px",marginBottom:"5px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <p style={{margin:0,color:"rgba(255,255,255,0.6)",fontSize:"12px"}}>{h.query}</p>
                    <p style={{margin:"1px 0 0",color:"rgba(255,255,255,0.22)",fontSize:"9px"}}>📱 {h.user}</p>
                  </div>
                  <span style={{color:"rgba(255,255,255,0.2)",fontSize:"9px"}}>{new Date(h.ts).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── MAIN APP ───────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("auth");
      const [tab, setTab] = useState("home");
      const [currentUser, setCurrentUser] = useState(null);
      const [registeredUsers, setRegisteredUsers] = useState([]);
      const [adminEarnings, setAdminEarnings] = useState(0);
      const [searchHistory, setSearchHistory] = useState([]);

      const onAuth = (user) => { setCurrentUser(user); setTimeout(()=>setScreen("main"),600); };
      const updateUser = (fn) => {
        setCurrentUser(prev => {
          const updated = fn(prev);
          setRegisteredUsers(all => all.map(u => u.id===updated.id ? updated : u));
          return updated;
        });
      };

      const NAV = [["home","🏠","হোম"],["search","🔍","Search"],["upi","💸","পাঠান"],["download","⬇","Download"],["premium","👑","Premium"],["admin","🔐","Admin"]];

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0d0d1a 0%,#12122a 55%,#0d0d1a 100%)",fontFamily:"'Noto Sans Bengali','Noto Sans',sans-serif",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"13px 16px 0",maxWidth:"480px",width:"100%",margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
              <div style={{width:"38px",height:"38px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"11px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",boxShadow:"0 4px 14px rgba(132,94,247,0.35)",flexShrink:0}}>🌐</div>
              <div>
                <h1 style={{color:"#fff",fontSize:"14px",fontWeight:800}}>BongBrowser</h1>
                <p style={{color:"rgba(255,255,255,0.28)",fontSize:"10px"}}>আপনার নিজের Browser</p>
              </div>
              {currentUser&&(
                <div style={{marginLeft:"auto",background:"rgba(132,94,247,0.14)",border:"1px solid rgba(132,94,247,0.28)",borderRadius:"50px",padding:"4px 10px",display:"flex",alignItems:"center",gap:"4px"}}>
                  <span style={{fontSize:"10px"}}>💰</span>
                  <span style={{color:"#c4b5fd",fontSize:"12px",fontWeight:700,fontFamily:"monospace"}}>₹{currentUser.balance}</span>
                </div>
              )}
            </div>
          </div>

          <div style={{flex:1,padding:"11px 16px",maxWidth:"480px",width:"100%",margin:"0 auto",animation:"fadeUp 0.4s ease both"}}>
            <div style={{background:"rgba(255,255,255,0.03)",backdropFilter:"blur(24px)",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.07)",padding:"16px",boxShadow:"0 20px 50px rgba(0,0,0,0.5)"}}>
              {screen==="auth"&&<AuthPage onAuth={onAuth} registeredUsers={registeredUsers} setRegisteredUsers={setRegisteredUsers}/>}
              {screen==="main"&&tab==="home"&&<HomePage user={currentUser} updateUser={updateUser} setAdminEarnings={setAdminEarnings} setSearchHistory={setSearchHistory}/>}
              {screen==="main"&&tab==="search"&&<SearchEngine user={currentUser} setSearchHistory={setSearchHistory}/>}
              {screen==="main"&&tab==="upi"&&<UPIPage user={currentUser} updateUser={updateUser}/>}
              {screen==="main"&&tab==="download"&&<DownloadPage/>}
              {screen==="main"&&tab==="premium"&&<PremiumPage user={currentUser} updateUser={updateUser}/>}
              {screen==="main"&&tab==="admin"&&<AdminPanel adminEarnings={adminEarnings} registeredUsers={registeredUsers} searchHistory={searchHistory}/>}
            </div>
          </div>

          {screen==="main"&&(
            <div style={{padding:"0 16px 18px",maxWidth:"480px",width:"100%",margin:"0 auto"}}>
              <div style={{background:"rgba(0,0,0,0.5)",backdropFilter:"blur(20px)",borderRadius:"17px",border:"1px solid rgba(255,255,255,0.06)",padding:"6px",display:"flex",gap:"4px"}}>
                {NAV.map(([key,icon,label])=>(
                  <button key={key} onClick={()=>setTab(key)}
                    style={{flex:1,padding:"8px 2px",border:"none",borderRadius:"11px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif",fontSize:"9px",fontWeight:700,transition:"all 0.2s",background:tab===key?"linear-gradient(135deg,#845ef7,#5c7cfa)":"transparent",color:tab===key?"#fff":"rgba(255,255,255,0.28)",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
                    <span style={{fontSize:"15px"}}>{icon}</span>
                    <span>{label}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
