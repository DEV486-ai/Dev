// ── BENGALI KEYBOARD ──────────────────────────────────────
function BengaliKeyboard({targetRef,onClose}){
  const type=(char)=>{
    const el=targetRef.current;
    if(!el)return;
    if(char==="⌫"){el.value=el.value.slice(0,-1);}
    else{
      const s=el.selectionStart||el.value.length;
      el.value=el.value.slice(0,s)+char+el.value.slice(s);
      el.selectionStart=el.selectionEnd=s+char.length;
    }
    el.dispatchEvent(new Event("input",{bubbles:true}));
    el.focus();
  };
  const rows=[
    ["অ","আ","ই","ঈ","উ","ঊ","এ","ঐ","ও","ঔ"],
    ["ক","খ","গ","ঘ","চ","ছ","জ","ঝ","ট","ঠ"],
    ["ড","ঢ","ণ","ত","থ","দ","ধ","ন","প","ফ"],
    ["ব","ভ","ম","য","র","ল","শ","ষ","স","হ"],
    ["া","ি","ী","ু","ূ","ে","ো","ং","ঃ","্"],
  ];
  const kb={background:"rgba(0,0,0,0.97)",borderTop:"1px solid rgba(132,94,247,0.3)",padding:"10px 6px 16px",flexShrink:0};
  const kbtn={minWidth:"30px",height:"38px",padding:"0 4px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"7px",color:"#fff",fontSize:"15px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif",transition:"all .12s"};
  return(
    <div style={kb}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px",padding:"0 4px"}}>
        <span style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",fontWeight:700}}>⌨️ বাংলা Keyboard</span>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"16px",cursor:"pointer"}}>✕</button>
      </div>
      {rows.map((row,ri)=>(
        <div key={ri} style={{display:"flex",gap:"4px",justifyContent:"center",marginBottom:"4px"}}>
          {row.map(ch=>(
            <button key={ch} onMouseDown={e=>{e.preventDefault();type(ch);}} style={kbtn}>{ch}</button>
          ))}
        </div>
      ))}
      <div style={{display:"flex",gap:"4px",justifyContent:"center",marginTop:"4px"}}>
        <button onMouseDown={e=>{e.preventDefault();type("⌫");}} style={{...kbtn,minWidth:"70px",fontSize:"12px"}}>⌫ মুছো</button>
        <button onMouseDown={e=>{e.preventDefault();type(" ");}} style={{...kbtn,minWidth:"130px",fontSize:"12px"}}>স্পেস</button>
        <button onMouseDown={e=>{e.preventDefault();onClose();}} style={{...kbtn,minWidth:"70px",fontSize:"12px",background:"rgba(132,94,247,0.3)"}}>OK ✓</button>
      </div>
    </div>
  );
}

// ── BROWSER VIEW ───────────────────────────────────────────
function BrowserView({url,onClose}){
  const [loading,setLoading]=useState(true);
  const [currentUrl,setCurrentUrl]=useState(url);
  const [inputUrl,setInputUrl]=useState(url);
  const [showKb,setShowKb]=useState(false);
  const [showBM,setShowBM]=useState(false);
  const [bookmarks,setBookmarks]=useState(getBM);
  const [bmMsg,setBmMsg]=useState("");
  const inputRef=useRef(null);

  const getEmbed=(u)=>{
    if(u.includes("youtube.com/results?search_query=")){
      const q=u.split("search_query=")[1]?.split("&")[0]||"";
      return `https://www.youtube.com/embed?listType=search&list=${q}`;
    }
    if(u.includes("youtube.com/watch?v=")){
      const v=u.split("v=")[1]?.split("&")[0];
      return `https://www.youtube.com/embed/${v}?autoplay=1`;
    }
    if(u.includes("google.com/maps/search/")||u.includes("maps.google.com")){
      const q=u.includes("/search/")?u.split("/search/")[1]||"":u.split("q=")[1]?.split("&")[0]||"India";
      return `https://maps.google.com/maps?q=${encodeURIComponent(decodeURIComponent(q))}&output=embed&z=14`;
    }
    return u;
  };

  const isYT=currentUrl.includes("youtube.com")||currentUrl.includes("youtu.be");
  const ytVid=isYT?(currentUrl.split("v=")[1]?.split("&")[0]||null):null;

  const addBookmark=()=>{
    const list=getBM();
    if(list.find(b=>b.url===currentUrl)){setBmMsg("⭐ আগেই সেভ আছে!");setTimeout(()=>setBmMsg(""),2000);return;}
    const updated=[{url:currentUrl,title:currentUrl,time:Date.now()},...list.slice(0,49)];
    saveBM(updated);setBookmarks(updated);
    setBmMsg("⭐ বুকমার্ক সেভ হয়েছে!");setTimeout(()=>setBmMsg(""),2000);
  };

  const delBookmark=(idx)=>{
    const updated=bookmarks.filter((_,i)=>i!==idx);
    saveBM(updated);setBookmarks(updated);
  };

  const openYTApp=()=>{
    const link=ytVid?`https://www.youtube.com/watch?v=${ytVid}`:currentUrl;
    const intent=ytVid?`intent://youtube.com/watch?v=${ytVid}#Intent;package=com.google.android.youtube;scheme=https;end`:null;
    if(intent)window.location.href=intent;
    setTimeout(()=>window.open(link,"_blank"),800);
  };

  const downloadPage=()=>{
    if(/\.(jpg|jpeg|png|gif|pdf|mp3|mp4|zip|apk)$/i.test(currentUrl)){
      const a=document.createElement("a");a.href=currentUrl;a.download=currentUrl.split("/").pop();a.click();
    } else {
      window.open(currentUrl,"_blank");
    }
  };

  const navBtnS={background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"7px",padding:"6px 9px",color:"rgba(255,255,255,0.7)",fontSize:"13px",cursor:"pointer",flexShrink:0};

  return(
    <div style={{position:"fixed",inset:0,background:"#0d0d1a",zIndex:4000,display:"flex",flexDirection:"column"}}>

      {/* Top bar */}
      <div style={{background:"rgba(0,0,0,0.92)",padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
        {/* Row 1: close + url + go */}
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
          <button onClick={onClose} style={{...navBtnS,background:"rgba(255,60,60,0.2)",border:"1px solid rgba(255,60,60,0.3)",color:"#ff6b6b",fontWeight:700}}>✕</button>
          <div style={{flex:1,position:"relative"}}>
            <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"11px"}}>🔒</span>
            <input ref={inputRef} value={inputUrl} onChange={e=>setInputUrl(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){setCurrentUrl(inputUrl);setLoading(true);}}}
              style={{width:"100%",padding:"7px 8px 7px 26px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"9px",color:"#fff",fontSize:"11px",outline:"none",boxSizing:"border-box",fontFamily:"'Noto Sans Bengali',sans-serif"}}/>
          </div>
          <button onClick={()=>{setCurrentUrl(inputUrl);setLoading(true);}} style={{...navBtnS,background:"rgba(132,94,247,0.35)",color:"#c4b5fd"}}>→</button>
        </div>
        {/* Row 2: action buttons */}
        <div style={{display:"flex",gap:"5px",alignItems:"center",overflowX:"auto"}}>
          <button onClick={addBookmark} style={navBtnS} title="বুকমার্ক করো">⭐</button>
          <button onClick={()=>setShowBM(p=>!p)} style={{...navBtnS,background:showBM?"rgba(132,94,247,0.3)":undefined}} title="বুকমার্ক দেখো">📚</button>
          <button onClick={()=>setShowKb(p=>!p)} style={{...navBtnS,background:showKb?"rgba(132,94,247,0.3)":undefined}} title="বাংলা Keyboard">⌨️</button>
          <button onClick={downloadPage} style={navBtnS} title="Download">📥</button>
          <button onClick={()=>window.open(currentUrl,"_blank")} style={navBtnS} title="Chrome-এ খুলুন">↗</button>
          {isYT&&<button onClick={openYTApp} style={{...navBtnS,background:"rgba(255,0,0,0.25)",color:"#ff6b6b",fontSize:"11px",padding:"6px 8px"}}>▶ YT App</button>}
          {bmMsg&&<span style={{color:"#34c759",fontSize:"10px",whiteSpace:"nowrap",fontWeight:700,marginLeft:"4px"}}>{bmMsg}</span>}
        </div>
      </div>

      {/* Loading bar */}
      {loading&&<div style={{height:"3px",background:"rgba(255,255,255,0.04)",flexShrink:0,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",height:"100%",width:"30%",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",animation:"slidebar 1.2s ease infinite"}}/>
      </div>}

      {/* Bookmark panel */}
      {showBM&&(
        <div style={{background:"rgba(10,10,24,0.98)",borderBottom:"1px solid rgba(255,255,255,0.07)",maxHeight:"220px",overflowY:"auto",flexShrink:0,padding:"8px 10px"}}>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",fontWeight:700,margin:"0 0 7px"}}>⭐ সেভ করা বুকমার্ক ({bookmarks.length})</p>
          {bookmarks.length===0&&<p style={{color:"rgba(255,255,255,0.2)",fontSize:"11px",textAlign:"center",padding:"12px 0"}}>এখনো কোনো বুকমার্ক নেই</p>}
          {bookmarks.map((b,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 8px",background:"rgba(255,255,255,0.04)",borderRadius:"9px",marginBottom:"5px",border:"1px solid rgba(255,255,255,0.06)"}}>
              <span style={{fontSize:"13px"}}>🌐</span>
              <span onClick={()=>{setCurrentUrl(b.url);setInputUrl(b.url);setLoading(true);setShowBM(false);}} style={{flex:1,color:"#c4b5fd",fontSize:"11px",cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.url}</span>
              <button onClick={()=>delBookmark(i)} style={{background:"transparent",border:"none",color:"rgba(255,100,100,0.6)",cursor:"pointer",fontSize:"14px",flexShrink:0}}>🗑</button>
            </div>
          ))}
        </div>
      )}

      {/* iframe */}
      <iframe src={getEmbed(currentUrl)} style={{flex:1,border:"none",width:"100%"}}
        allowFullScreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share"
        onLoad={()=>setLoading(false)}
        referrerPolicy="no-referrer-when-downgrade"
      />

      {/* Bengali keyboard */}
      {showKb&&<BengaliKeyboard targetRef={inputRef} onClose={()=>setShowKb(false)}/>}

      {!showKb&&<div style={{background:"rgba(0,0,0,0.7)",padding:"4px",textAlign:"center",flexShrink:0}}>
        <span style={{color:"rgba(255,255,255,0.15)",fontSize:"9px"}}>🌐 BongBrowser Engine</span>
      </div>}
    </div>
  );
}

    const e=encodeURIComponent(q);
    // Image results - use Unsplash (no iframe block)
    if(tab==="images")return[
      {t:`${q} - ছবি ১`,type:"image",url:`https://source.unsplash.com/400x300/?${e}`,thumb:`https://source.unsplash.com/400x300/?${e}`,d:`${q} ছবি।`,icon:"🖼️"},
      {t:`${q} - ছবি ২`,type:"image",url:`https://source.unsplash.com/400x300/?${e},2`,thumb:`https://source.unsplash.com/400x300/?${e},2`,d:`${q} photo।`,icon:"📷"},
      {t:`${q} - ছবি ৩`,type:"image",url:`https://source.unsplash.com/400x300/?${e},nature`,thumb:`https://source.unsplash.com/400x300/?${e},nature`,d:`${q} image।`,icon:"🖼️"},
      {t:`${q} - ছবি ৪`,type:"image",url:`https://source.unsplash.com/400x300/?${e},hd`,thumb:`https://source.unsplash.com/400x300/?${e},hd`,d:`${q} HD।`,icon:"📸"},
    ];
    // Video results with YouTube embed
    if(tab==="videos")return[
      {t:`${q} - ভিডিও`,type:"video",url:`https://www.youtube.com/results?search_query=${e}`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`YouTube-এ ${q} ভিডিও।`,icon:"🎬"},
      {t:`${q} Full Video`,type:"video",url:`https://www.youtube.com/results?search_query=${e}+full+video`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} পুরো ভিডিও।`,icon:"▶️"},
      {t:`${q} Official`,type:"video",url:`https://www.youtube.com/results?search_query=${e}+official`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} Official।`,icon:"🎬"},
    ];
    if(tab==="music")return[
      {t:`${q} Song`,type:"video",url:`https://www.youtube.com/results?search_query=${e}+song`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} গান।`,icon:"🎵"},
      {t:`${q} Music`,type:"video",url:`https://www.youtube.com/results?search_query=${e}+music+video`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} music।`,icon:"🎶"},
      {t:`${q} Audio`,type:"video",url:`https://www.youtube.com/results?search_query=${e}+audio`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} audio।`,icon:"🎵"},
    ];
    if(tab==="maps")return[
      {t:`${q} - Maps`,type:"map",url:`https://www.google.com/maps/search/${e}`,thumb:null,d:`${q} Maps-এ।`,icon:"🗺️"},
      {t:`${q} কাছে`,type:"map",url:`https://www.google.com/maps/search/${e}+near+me`,thumb:null,d:`কাছের ${q}।`,icon:"📍"},
    ];
    if(tab==="news")return[
      {t:`${q} - সর্বশেষ খবর`,type:"web",url:`https://news.google.com/search?q=${e}`,thumb:null,d:`${q} সর্বশেষ খবর।`,icon:"📰"},
      {t:`${q} Today`,type:"web",url:`https://www.google.com/search?q=${e}&tbm=nws`,thumb:null,d:`${q} আজকের খবর।`,icon:"📰"},
    ];
    if(tab==="shopping")return[
      {t:`${q} - Flipkart`,type:"web",url:`https://www.flipkart.com/search?q=${e}`,thumb:null,d:`Flipkart-এ ${q}।`,icon:"🛒"},
      {t:`${q} - Amazon`,type:"web",url:`https://www.amazon.in/s?k=${e}`,thumb:null,d:`Amazon-এ ${q}।`,icon:"🛍️"},
    ];
    // All/default results
    return[
      {t:`${q} - Wikipedia`,type:"web",url:`https://bn.wikipedia.org/wiki/${e}`,thumb:null,d:`${q} বাংলা Wikipedia।`,icon:"🌐"},
      {t:`${q} কি?`,type:"web",url:`https://bn.wikipedia.org/wiki/${e}`,thumb:null,d:`${q} সম্পর্কে জানুন।`,icon:"📖"},
      {t:`${q} Video`,type:"video",url:`https://www.youtube.com/results?search_query=${e}`,thumb:`https://img.youtube.com/vi/search/mqdefault.jpg`,d:`${q} video।`,icon:"🎬"},
      {t:`${q} News`,type:"web",url:`https://news.google.com/search?q=${e}`,thumb:null,d:`${q} সর্বশেষ খবর।`,icon:"📰"},
      {t:`${q} - Wikipedia EN`,type:"web",url:`https://en.wikipedia.org/wiki/${e}`,thumb:null,d:`English Wikipedia।`,icon:"📚"},
      {t:`${q} Shopping`,type:"web",url:`https://www.flipkart.com/search?q=${e}`,thumb:null,d:`${q} কিনুন।`,icon:"🛒"},
    ];
  };

  const handleClick=(r)=>{
    if(r.type==="image") setPhotoUrl(r.url);
    else setBrowserUrl(r.url);
  };

  const search=(q,tab)=>{
    const sq=q!==undefined?q:query;
    const st=tab||activeTab;
    if(!sq.trim())return;
    setSearched(true);setLoading(true);setImgErrors({});
    setSearchHistory(p=>[{query:sq,user:user?user.phone:"guest",ts:Date.now()},...p.slice(0,49)]);
    setTimeout(()=>{setResults(getR(sq,st));setLoading(false);},600);
  };

  return(
    <div>
      {browserUrl&&<BrowserView url={browserUrl} onClose={()=>setBrowserUrl(null)}/>}
      {photoUrl&&<PhotoViewer url={photoUrl} onClose={()=>setPhotoUrl(null)}/>}

      <div style={{textAlign:"center",marginBottom:"12px"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:"7px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"11px",padding:"5px 13px"}}>
          <span style={{fontSize:"13px"}}>🌐</span>
          <span style={{color:"#fff",fontSize:"12px",fontWeight:800}}>BongBrowser Search</span>
        </div>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:"9px",margin:"4px 0 0"}}>History শুধু BongBrowser-এ • Google Chrome-এ যাবে না</p>
      </div>

      <div style={{display:"flex",gap:"7px",marginBottom:"10px"}}>
        <div style={{flex:1,position:"relative"}}>
          <span style={{position:"absolute",left:"11px",top:"50%",transform:"translateY(-50%)",fontSize:"14px"}}>🔍</span>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="BongBrowser-এ search করুন..."
            style={{width:"100%",padding:"11px 11px 11px 33px",background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.15)",borderRadius:"12px",color:"#fff",fontSize:"13px",fontFamily:"'Noto Sans Bengali',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <button onClick={()=>search()} style={{background:"linear-gradient(135deg,#845ef7,#5c7cfa)",border:"none",borderRadius:"12px",padding:"0 14px",color:"#fff",fontSize:"16px",cursor:"pointer"}}>→</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:"5px",overflowX:"auto",paddingBottom:"6px",marginBottom:"10px"}}>
        {STABS.map(tab=>(
          <button key={tab.key} onClick={()=>{setActiveTab(tab.key);if(searched&&query.trim())search(query,tab.key);}}
            style={{padding:"6px 11px",border:"none",borderRadius:"50px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Noto Sans Bengali',sans-serif",fontSize:"11px",fontWeight:700,background:activeTab===tab.key?"linear-gradient(135deg,#845ef7,#5c7cfa)":"rgba(255,255,255,0.06)",color:activeTab===tab.key?"#fff":"rgba(255,255,255,0.5)",flexShrink:0,transition:"all 0.2s"}}>
            {tab.icon} {tab.label}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"24px 0"}}>
        <div style={{width:"32px",height:"32px",border:"3px solid rgba(132,94,247,0.2)",borderTop:"3px solid #845ef7",borderRadius:"50%",margin:"0 auto 8px",animation:"spin 0.8s linear infinite"}}/>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",margin:0}}>BongBrowser Search করছে...</p>
      </div>}

      {!loading&&searched&&(
        <>
          {(activeTab==="all"||activeTab==="ai")&&<AIAnswer query={query}/>}

          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"10px",marginBottom:"8px"}}>"{query}" — {results.length}টি results ✓ BongBrowser History</p>

          {/* Image Grid for image tab */}
          {activeTab==="images"?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              {results.map((r,i)=>(
                <div key={i} onClick={()=>handleClick(r)} style={{borderRadius:"12px",overflow:"hidden",cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",position:"relative"}}>
                  {!imgErrors[i]?(
                    <img src={r.url} alt={r.t}
                      style={{width:"100%",height:"120px",objectFit:"cover",display:"block"}}
                      onError={()=>setImgErrors(p=>({...p,[i]:true}))}
                    />
                  ):(
                    <div style={{width:"100%",height:"120px",background:"rgba(132,94,247,0.1)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:"28px",marginBottom:"6px"}}>🖼️</span>
                      <span style={{color:"rgba(255,255,255,0.4)",fontSize:"10px"}}>ছবি দেখতে click করুন</span>
                    </div>
                  )}
                  <div style={{padding:"6px 8px"}}>
                    <p style={{margin:0,color:"rgba(255,255,255,0.6)",fontSize:"10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.t}</p>
                  </div>
                </div>
              ))}
            </div>
          ):(
            /* Video/Music Grid with thumbnails */
            activeTab==="videos"||activeTab==="music"?(
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {results.map((r,i)=>(
                  <div key={i} onClick={()=>handleClick(r)}
                    style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"13px",overflow:"hidden",cursor:"pointer",display:"flex",gap:"0"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
                    onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                    {/* Video Thumbnail */}
                    <div style={{width:"120px",height:"78px",background:"rgba(0,0,0,0.5)",flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                      <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(132,94,247,0.3),rgba(0,0,0,0.5))",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <div style={{width:"36px",height:"36px",background:"rgba(255,0,0,0.8)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"}}>▶</div>
                      </div>
                      <span style={{fontSize:"32px",opacity:0.3}}>{r.icon}</span>
                    </div>
                    <div style={{flex:1,padding:"10px 12px",minWidth:0}}>
                      <p style={{margin:"0 0 4px",color:"#c4b5fd",fontSize:"12px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.t}</p>
                      <p style={{margin:"0 0 4px",color:"rgba(255,255,255,0.2)",fontSize:"9px",display:"flex",alignItems:"center",gap:"4px"}}>
                        <span>🎬 YouTube</span>
                        <span style={{background:"rgba(52,199,89,0.15)",color:"#34c759",padding:"1px 5px",borderRadius:"4px",fontSize:"8px"}}>BongBrowser-এই চলবে</span>
                      </p>
                      <p style={{margin:0,color:"rgba(255,255,255,0.4)",fontSize:"10px"}}>{r.d}</p>
                    </div>
                  </div>
                ))}
              </div>
            ):(
              /* Regular list results */
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {results.map((r,i)=>(
                  <div key={i} onClick={()=>handleClick(r)}
                    style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"13px",padding:"12px 13px",cursor:"pointer",transition:"all 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
                    onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                    <div style={{display:"flex",gap:"10px"}}>
                      <div style={{width:"30px",height:"30px",background:"rgba(132,94,247,0.15)",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0}}>{r.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:"0 0 2px",color:"#c4b5fd",fontSize:"12px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.t}</p>
                        <p style={{margin:"0 0 3px",color:"rgba(255,255,255,0.2)",fontSize:"9px"}}>🌐 BongBrowser</p>
                        <p style={{margin:0,color:"rgba(255,255,255,0.45)",fontSize:"11px"}}>{r.d}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )
          )}
        </>
      )}

      {!searched&&(
        <div>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",fontWeight:600,marginBottom:"10px"}}>জনপ্রিয় Search</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
            {["বাংলা সিনেমা","IPL 2024","Free recharge","Recipe bangla","Tech news","Cricket","Weather","Bollywood"].map((s,i)=>(
              <button key={i} onClick={()=>{setQuery(s);setTimeout(()=>search(s),50);}}
                style={{padding:"7px 12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"50px",color:"rgba(255,255,255,0.55)",fontSize:"11px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>
                🔍 {s}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── AUTH PAGE ──────────────────────────────────────────────
function AuthPage({onAuth,registeredUsers,setRegisteredUsers}){
  const [mode,setMode]=useState("login");
  const [step,setStep]=useState("form");
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [otp,setOtp]=useState("");
  const [genOtp,setGenOtp]=useState("");
  const [errors,setErrors]=useState({});
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const [adminEmail,setAdminEmail]=useState("");
  const [adminPass,setAdminPass]=useState("");
  const [adminError,setAdminError]=useState("");
  const [gLoading,setGLoading]=useState(false);

  const setF=(k,v)=>{setForm(p=>({...p,[k]:v}));setErrors(p=>({...p,[k]:""}));};

  const valReg=()=>{
    const e={};
    if(!form.name.trim())e.name="নাম দিন";
    if(!form.email.includes("@"))e.email="সঠিক Email দিন";
    if(form.password.length<6)e.password="কমপক্ষে ৬ অক্ষর";
    if(registeredUsers.find(u=>u.email===form.email))e.email="এই Email আগেই registered!";
    setErrors(e);return Object.keys(e).length===0;
  };

  const valLogin=()=>{
    const e={};
    if(!form.email.includes("@"))e.email="সঠিক Email দিন";
    if(!form.password)e.password="Password দিন";
    setErrors(e);return Object.keys(e).length===0;
  };

  const sendOTP=async()=>{
    if(!valReg())return;
    setLoading(true);
    const code=Math.floor(100000+Math.random()*900000).toString();
    setGenOtp(code);
    setStep("otp");
    setLoading(false);
  };

  const verifyOTP=()=>{
    if(otp.length!==6){setErrors({otp:"৬ সংখ্যার OTP দিন"});return;}
    if(otp!==genOtp){setErrors({otp:"OTP ভুল!"});return;}
    const user={id:Date.now(),...form,balance:0,adsWatched:0,plan:"free",joinedAt:Date.now(),status:"active",txHistory:[],loginMethod:"email"};
    setRegisteredUsers(p=>[...p,user]);
    onAuth(user);
  };

  const handleLogin=()=>{
    if(!valLogin())return;
    const user=registeredUsers.find(u=>u.email===form.email&&u.password===form.password);
    if(!user){setErrors({password:"Email বা Password ভুল!"});return;}
    onAuth(user);
  };

  const handleAdmin=()=>{
    if(ADMIN_EMAILS.includes(adminEmail)&&adminPass===ADMIN_PW){
      onAuth({id:"admin",name:"Admin",email:adminEmail,phone:"0000000000",balance:0,adsWatched:0,plan:"premium",joinedAt:Date.now(),status:"active",txHistory:[],loginMethod:"admin",isAdmin:true});
    }else setAdminError("⚠ ভুল Email বা Password!");
  };

  const handleGoogle=async()=>{
    setGLoading(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      provider.addScope("email");
      try{
        const r=await firebase.auth().signInWithPopup(provider);
        const g=r.user;
        const u={id:g.uid,name:g.displayName||"Google User",email:g.email,phone:"0000000000",photoURL:g.photoURL,password:"",balance:10,adsWatched:0,plan:"free",joinedAt:Date.now(),status:"active",txHistory:[],loginMethod:"google"};
        setRegisteredUsers(p=>{const ex=p.find(x=>x.email===u.email);return ex?p:[...p,u];});
        onAuth(u);
      }catch(e){
        await firebase.auth().signInWithRedirect(new firebase.auth.GoogleAuthProvider());
      }
    }catch(e){alert("Google login হয়নি।");setGLoading(false);}
  };

  const btn={background:"linear-gradient(135deg,#845ef7,#5c7cfa)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px",fontSize:"14px",fontWeight:700,width:"100%",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"};

  return(
    <div>
      <div style={{textAlign:"center",marginBottom:"18px"}}>
        <div style={{width:"52px",height:"52px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",margin:"0 auto 10px",boxShadow:"0 8px 24px rgba(132,94,247,0.4)"}}>🌐</div>
        <h2 style={{color:"#fff",fontSize:"18px",fontWeight:800,margin:"0 0 3px"}}>BongBrowser</h2>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:"11px",margin:0}}>আপনার নিজের Browser</p>
      </div>

      {/* Mode Tabs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:"rgba(0,0,0,0.3)",borderRadius:"12px",padding:"4px",marginBottom:"16px",gap:"3px"}}>
        {[["login","🔑","Login"],["register","📝","Register"],["admin","🔐","Admin"]].map(([m,icon,l])=>(
          <button key={m} onClick={()=>{setMode(m);setStep("form");setErrors({});setAdminError("");}}
            style={{padding:"9px 4px",border:"none",borderRadius:"10px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif",fontSize:"12px",fontWeight:700,background:mode===m?"linear-gradient(135deg,#845ef7,#5c7cfa)":"transparent",color:mode===m?"#fff":"rgba(255,255,255,0.4)",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
            <span>{icon}</span><span>{l}</span>
          </button>
        ))}
      </div>

      {mode!=="admin"&&(
        <>
          <button onClick={handleGoogle} disabled={gLoading}
            style={{width:"100%",padding:"12px",background:"#fff",border:"none",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",cursor:gLoading?"not-allowed":"pointer",marginBottom:"14px",fontWeight:700,fontSize:"14px",color:"#333",boxShadow:"0 2px 12px rgba(0,0,0,0.3)",opacity:gLoading?0.7:1,fontFamily:"'Noto Sans Bengali',sans-serif"}}>
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            {gLoading?"লোড হচ্ছে...":"Continue with Google"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
            <div style={{flex:1,height:"1px",background:"rgba(255,255,255,0.1)"}}/>
            <span style={{color:"rgba(255,255,255,0.25)",fontSize:"11px"}}>অথবা Email দিয়ে</span>
            <div style={{flex:1,height:"1px",background:"rgba(255,255,255,0.1)"}}/>
          </div>
        </>
      )}

      {/* REGISTER */}
      {mode==="register"&&step==="form"&&(
        <>
          {[["name","নাম","আপনার নাম","text"],["email","Email","example@gmail.com","email"]].map(([k,label,ph,type])=>(
            <div key={k} style={{marginBottom:"10px"}}>
              <label style={{display:"block",color:"rgba(255,255,255,0.45)",fontSize:"11px",fontWeight:600,marginBottom:"5px"}}>{label}</label>
              <input style={inp(errors,k)} placeholder={ph} type={type} value={form[k]} onChange={e=>setF(k,e.target.value)}/>
              {errors[k]&&<p style={{color:"#ff7070",fontSize:"10px",margin:"3px 0 0"}}>⚠ {errors[k]}</p>}
            </div>
          ))}
          <div style={{marginBottom:"14px"}}>

// ── DOWNLOAD ───────────────────────────────────────────────
function DownloadPage(){
  const [url,setUrl]=useState("");
  const [saveTo,setSaveTo]=useState("phone");
  const [downloads,setDownloads]=useState([]);
  const [progress,setProgress]=useState(0);
  const [downloading,setDownloading]=useState(false);
  const start=()=>{
    if(!url.trim())return;
    const name=url.split("/").pop()||"file_"+Date.now();
    setDownloading(true);setProgress(0);
    const iv=setInterval(()=>{setProgress(p=>{if(p>=100){clearInterval(iv);setDownloading(false);setDownloads(prev=>[{id:Date.now(),name,status:"done",saveTo},...prev]);setUrl("");return 0;}return Math.min(100,p+Math.random()*18);});},300);
  };
  return(
    <div>
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"18px",padding:"16px",marginBottom:"12px"}}>

        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://example.com/file.apk"
          style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"11px",color:"#fff",fontSize:"13px",fontFamily:"'Noto Sans Bengali',sans-serif",outline:"none",marginBottom:"10px",boxSizing:"border-box"}}/>

          {[["phone","📱 Phone"],["sd","💾 SD Card"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSaveTo(v)} style={{flex:1,padding:"9px",border:`1.5px solid ${saveTo===v?"rgba(132,94,247,0.5)":"rgba(255,255,255,0.09)"}`,borderRadius:"10px",background:saveTo===v?"rgba(132,94,247,0.15)":"rgba(255,255,255,0.03)",color:saveTo===v?"#c4b5fd":"rgba(255,255,255,0.4)",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif"}}>{l}</button>
          ))}
        </div>
        {downloading?(
          <>

function App(){
  const [screen,setScreen]=useState("auth");
  const [tab,setTab]=useState("home");
  const [currentUser,setCurrentUser]=useState(null);
  const [registeredUsers,setRegisteredUsers]=useState([]);
  const [adminEarnings,setAdminEarnings]=useState(0);
  const [searchHistory,setSearchHistory]=useState([]);
  const [isLight,setIsLight]=useState(()=>localStorage.getItem("bb_theme")==="light");

  const toggleTheme=()=>{
    setIsLight(p=>{
      const next=!p;
      localStorage.setItem("bb_theme",next?"light":"dark");
      return next;
    });
  };

  const themeVars=isLight?{
    "--bg":"#f0f2f8","--text":"#1a1a2e","--card":"rgba(255,255,255,0.9)",
    "--border":"rgba(0,0,0,0.1)","--sub":"rgba(0,0,0,0.4)"
  }:{
    "--bg":"#0d0d1a","--text":"#fff","--card":"rgba(255,255,255,0.03)",
    "--border":"rgba(255,255,255,0.07)","--sub":"rgba(255,255,255,0.28)"
  };

  const onAuth=(user)=>{setCurrentUser(user);setTimeout(()=>setScreen("main"),600);};

  const handleLogout=async()=>{
    try{await firebase.auth().signOut();}catch(e){}
    setCurrentUser(null);
    setScreen("auth");
    setTab("home");
  };

  const updateUser=(fn)=>{
    setCurrentUser(prev=>{
      const updated=fn(prev);
      setRegisteredUsers(all=>all.map(u=>u.id===updated.id?updated:u));
      return updated;
    });
  };

  const NAV=[["home","🏠","হোম"],["search","🔍","Search"],["upi","💸","পাঠান"],["download","⬇","Download"],["premium","👑","Premium"],["admin","🔐","Admin"]];

  return(
    <div style={{minHeight:"100vh",background:isLight?"linear-gradient(145deg,#e8eaf6,#f0f2ff)":"linear-gradient(145deg,#0d0d1a 0%,#12122a 55%,#0d0d1a 100%)",fontFamily:"'Noto Sans Bengali','Noto Sans',sans-serif",display:"flex",flexDirection:"column"}}>

      <div style={{padding:"13px 16px 0",maxWidth:"480px",width:"100%",margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
          <div style={{width:"38px",height:"38px",background:"linear-gradient(135deg,#845ef7,#5c7cfa)",borderRadius:"11px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",boxShadow:"0 4px 14px rgba(132,94,247,0.35)",flexShrink:0}}>🌐</div>
          <div>
            <h1 style={{color:isLight?"#1a1a2e":"#fff",fontSize:"14px",fontWeight:800}}>BongBrowser</h1>
            <p style={{color:isLight?"rgba(0,0,0,0.4)":"rgba(255,255,255,0.28)",fontSize:"10px"}}>আপনার নিজের Browser</p>
          </div>
          {currentUser&&(
            <div style={{marginLeft:"auto",display:"flex",gap:"6px",alignItems:"center"}}>
              <div style={{background:"rgba(132,94,247,0.14)",border:"1px solid rgba(132,94,247,0.28)",borderRadius:"50px",padding:"4px 10px",display:"flex",alignItems:"center",gap:"4px"}}>
                <span style={{fontSize:"10px"}}>💰</span>
                <span style={{color:"#c4b5fd",fontSize:"12px",fontWeight:700,fontFamily:"monospace"}}>₹{currentUser.balance}</span>
              </div>
            </div>
          )}
          {/* Theme Toggle */}
          <button onClick={toggleTheme} style={{marginLeft:currentUser?"4px":"auto",background:isLight?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.08)",border:`1px solid ${isLight?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.12)"}`,borderRadius:"50px",padding:"5px 10px",cursor:"pointer",fontSize:"14px",flexShrink:0}} title={isLight?"Dark Mode":"Light Mode"}>
            {isLight?"☀️":"🌙"}
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,padding:"11px 16px",maxWidth:"480px",width:"100%",margin:"0 auto",animation:"fadeUp 0.4s ease both"}}>
        <div style={{background:"rgba(255,255,255,0.03)",backdropFilter:"blur(24px)",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.07)",padding:"16px",boxShadow:"0 20px 50px rgba(0,0,0,0.5)"}}>
          {screen==="auth"&&<AuthPage onAuth={onAuth} registeredUsers={registeredUsers} setRegisteredUsers={setRegisteredUsers}/>}
          {screen==="main"&&tab==="home"&&<HomePage user={currentUser} updateUser={updateUser} setAdminEarnings={setAdminEarnings} setSearchHistory={setSearchHistory} onLogout={handleLogout}/>}
          {screen==="main"&&tab==="search"&&<SearchEngine user={currentUser} setSearchHistory={setSearchHistory}/>}
          {screen==="main"&&tab==="upi"&&<UPIPage user={currentUser} updateUser={updateUser}/>}
          {screen==="main"&&tab==="download"&&<DownloadPage/>}
          {screen==="main"&&tab==="premium"&&<PremiumPage user={currentUser} updateUser={updateUser}/>}
          {screen==="main"&&tab==="admin"&&<AdminPanel adminEarnings={adminEarnings} registeredUsers={registeredUsers} searchHistory={searchHistory} isAdminUser={currentUser&&currentUser.isAdmin} onLogout={handleLogout}/>}
        </div>
      </div>

      {/* Bottom Nav */}
      {screen==="main"&&(
        <div style={{padding:"0 16px 18px",maxWidth:"480px",width:"100%",margin:"0 auto"}}>
          <div style={{background:"rgba(0,0,0,0.5)",backdropFilter:"blur(20px)",borderRadius:"17px",border:"1px solid rgba(255,255,255,0.06)",padding:"6px",display:"flex",gap:"4px"}}>
            {NAV.map(([key,icon,label])=>(
              <button key={key} onClick={()=>setTab(key)}
                style={{flex:1,padding:"8px 2px",border:"none",borderRadius:"11px",cursor:"pointer",fontFamily:"'Noto Sans Bengali',sans-serif",fontSize:"9px",fontWeight:700,transition:"all 0.2s",background:tab===key?"linear-gradient(135deg,#845ef7,#5c7cfa)":"transparent",color:tab===key?"#fff":"rgba(255,255,255,0.28)",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
                <span style={{fontSize:"15px"}}>{icon}</span>
                <span>{label}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
